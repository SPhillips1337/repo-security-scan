# =============================================================================
# Repo Security Scanner – Configuration Schema
# =============================================================================
# This YAML schema defines the expected structure for the scanner's
# configuration file (e.g., .repo_scan.yaml or config/scan-config.yaml).
#
# Usage:
#   repo-scan --config path/to/config.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Schema Metadata
# ---------------------------------------------------------------------------
schema_version: "1.0"
description: >
  Configuration schema for the GitHub Repo Security Scanner. Defines target
  directories, exclusion lists, custom detection patterns, severity thresholds,
  and output preferences.

# ---------------------------------------------------------------------------
# Top-Level Keys Overview
# ---------------------------------------------------------------------------
# targets:      List of repository paths to scan (absolute or relative).
# exclusions:   Directories, file extensions, and size limits to ignore.
# patterns:     Built-in pattern categories + custom overrides / additions.
# severity:     Minimum severity level to report on.
# output:       Formatting, destination, and alerting preferences.
# validation:   Rules enforced before scanning begins.

# ---------------------------------------------------------------------------
# Targets – Repositories / Directories to Scan
# ---------------------------------------------------------------------------
targets:
  type: list[Target]
  description: One or more repository roots the scanner will traverse.
  required: true
  min_items: 1

  # Item schema
  items:
    path:
      type: string
      description: >
        Absolute or relative filesystem path to a repository root or sub-directory.
      example: "./my-repo"

    label:
      type: string | null
      description: Optional human-readable alias used in reports.
      default: (same as `path`)
      example: "Payments Service"

    recurse:
      type: boolean
      description: Whether to scan sub-directories recursively.
      default: true

# ---------------------------------------------------------------------------
# Exclusions – What to Skip During Scanning
# ---------------------------------------------------------------------------
exclusions:
  type: ExclusionConfig
  description: Controls which files and directories are ignored during traversal.

  properties:
    # Directories skipped entirely (e.g., generated or virtual-environment dirs)
    ignore_dirs:
      type: list[string]
      default: >-
        [".git", "node_modules", "__pycache__", ".venv", "venv", "env",
         ".tox", ".mypy_cache", ".pytest_cache", "dist", "build", ".egg-info"]

    # File extensions treated as binary and skipped
    ignore_extensions:
      type: list[string]
      default: >-
        [".bin", ".exe", ".dll", ".so", ".dylib", ".ico", ".png", ".jpg",
         ".jpeg", ".gif", ".bmp", ".svg", ".pdf", ".zip", ".tar", ".gz",
         ".bz2", ".7z", ".rar", ".woff", ".woff2", ".ttf", ".eot",
         ".mp3", ".mp4", ".wav", ".avi", ".mov", ".webp", ".cache"]

    # Glob-style paths to skip (supports ** wildcards)
    ignore_paths:
      type: list[string]
      default: []
      example: ["**/test/**", "**/__snapshots__/**", "docs/examples/*"]

    # Maximum file size in bytes; larger files are skipped
    max_file_size:
      type: integer | string
      description: >-
        Integer (bytes) or human-readable string (e.g., "10MB"). Default is
        10 MB. Set to null or 0 to disable the limit.
      default: 10485760   # 10 * 1024 * 1024

# ---------------------------------------------------------------------------
# Patterns – Secret Detection Rules
# ---------------------------------------------------------------------------
patterns:
  type: PatternConfig
  description: >-
    Controls which built-in pattern categories are active and allows custom
    regex rules to be added or overridden.

  properties:

    # Enable / disable built-in categories entirely
    enabled_categories:
      type: list[string] | null
      default: all   # Scans every category defined in the registry
      available_values: >-
        ["aws", "github", "generic_api_key", "password", "private_key", "cloud"]

    disable_categories:
      type: list[string]
      description: Categories to remove from scanning (evaluated after `enabled_categories`).
      default: []

    # Override an existing built-in pattern by its registry name
    overrides:
      type: list[PatternOverride]
      description: >-
        Modify severity, regex, or enable/disable a built-in pattern without
        replacing the entire category.

      items:
        match_name:
          type: string
          description: Exact `name` of a registered SecretPattern to override.

        severity:
          type: string | null
          allowed_values: ["CRITICAL", "HIGH", "MEDIUM", "LOW"]

        regex:
          type: string | null
          description: Replacement regular expression (Python re syntax).

        enabled:
          type: boolean | null
          default: true

    # Add brand-new custom patterns not in the built-in registry
    custom:
      type: list[CustomPattern]
      description: User-defined detection rules appended to the registry.

      items:
        name:
          type: string
          required: true
          pattern: "^[A-Za-z][A-Za-z0-9 _-]*$"   # validation hint

        category:
          type: string
          default: "custom"

        severity:
          type: string
          allowed_values: ["CRITICAL", "HIGH", "MEDIUM", "LOW"]
          default: "MEDIUM"

        regex:
          type: string
          required: true
          description: Python regular expression (use raw-string style, no quotes).

        case_insensitive:
          type: boolean
          default: false

        description:
          type: string | null

        ignore_words:
          type: list[string]
          description: >-
            Adjacent words that indicate the match is a false positive
            (e.g., "example", "test", "sample").
          default: []

    # Example of a full pattern block
    example: |
      enabled_categories: ["aws", "github", "private_key"]
      disable_categories: ["cloud"]
      overrides:
        - match_name: "Generic API Key / Secret"
          severity: CRITICAL
        - match_name: "Email in Code"
          enabled: false
      custom:
        - name: Stripe Secret Key
          category: cloud
          severity: CRITICAL
          regex: "sk_live_[A-Za-z0-9]{24}"
          case_insensitive: true
          description: Live-mode Stripe secret key.
          ignore_words: []

# ---------------------------------------------------------------------------
# Severity Thresholds
# ---------------------------------------------------------------------------
severity:
  type: SeverityConfig
  properties:
    # Minimum severity to include in results (lower severities are filtered)
    minimum_level:
      type: string
      allowed_values: ["CRITICAL", "HIGH", "MEDIUM", "LOW"]
      default: "MEDIUM"

# ---------------------------------------------------------------------------
# Output Preferences
# ---------------------------------------------------------------------------
output:
  type: OutputConfig
  properties:
    # Console / file format
    format:
      type: string
      allowed_values: ["text", "json", "csv", "sarif"]
      default: "text"

    # Write results to a file (path) alongside console output
    file_path:
      type: string | null
      default: null
      example: "./reports/scan-results.json"

    # Whether to print matched line content in text mode
    show_line_content:
      type: boolean
      default: true

    # Maximum number of characters per displayed line (0 = unlimited)
    max_line_display:
      type: integer
      default: 200

    # Fail the process with a non-zero exit code when secrets are found
    fail_on_findings:
      type: boolean | string
      allowed_values_when_string: ["any", "critical_only"]
      default: false

# ---------------------------------------------------------------------------
# Validation Rules – Enforced Before Scanning Begins
# ---------------------------------------------------------------------------
validation:
  type: ValidationConfig
  description: >-
    Pre-scan checks that ensure the configuration and targets are valid.

  properties:
    # Verify every target path exists and is accessible
    check_targets_exist:
      type: boolean
      default: true

    # Reject if a target directory contains no scannable files
    warn_empty_results:
      type: boolean
      default: false

    # Require at least one active pattern category after filtering
    require_patterns:
      type: boolean
      default: true

    # Validate that custom `regex` entries compile without error before scanning
    validate_custom_regex:
      type: boolean
      default: true

    # Disallow duplicate `name` values among built-in + custom patterns
    enforce_unique_names:
      type: boolean
      default: true

# ---------------------------------------------------------------------------
# Minimal Example Configuration File
# ---------------------------------------------------------------------------
# The following illustrates a real-world configuration file that conforms to
# this schema. Save as `.repo_scan.yaml` and run:
#
#   $ repo-scan --config .repo_scan.yaml
#
# --- start example ---
# targets:
#   - path: "./services/auth"
#     label: "Auth Service"
#   - path: "../shared-lib"
#
# exclusions:
#   ignore_dirs: [".git", "node_modules"]
#   ignore_paths: ["**/vendor/**"]
#   max_file_size: "5MB"
#
# patterns:
#   enabled_categories: ["aws", "github", "private_key", "password"]
#   custom:
#     - name: Datadog API Key
#       category: cloud
#       severity: HIGH
#       regex: "dd-api-[A-F0-9]{32}"
#       case_insensitive: true
#
# severity:
#   minimum_level: HIGH
#
# output:
#   format: json
#   file_path: "./scan-results.json"
#   fail_on_findings: critical_only
# --- end example ---
